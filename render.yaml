services:
  - type: web
    runtime: node
    name: mohammad-umar-portfolio
    branch: master
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24
      - key: DATABASE_URL
        fromDatabase:
          name: mohammad-umar-db
          property: connectionString

databases:
  - name: mohammad-umar-db
    plan: free
